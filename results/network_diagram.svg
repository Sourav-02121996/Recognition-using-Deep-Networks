<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1260" viewBox="0 0 900 1260">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333" />
    </marker>
    <style>
      .title { font: 700 28px Georgia, serif; fill: #111111; }
      .subtitle { font: 500 18px Georgia, serif; fill: #444444; }
      .layer { fill: #f7f4ea; stroke: #6e5b3c; stroke-width: 2; rx: 14; ry: 14; }
      .layer-alt { fill: #eaf3f7; stroke: #3b6478; stroke-width: 2; rx: 14; ry: 14; }
      .layer-soft { fill: #f2ecf8; stroke: #6a4f91; stroke-width: 2; rx: 14; ry: 14; }
      .label { font: 700 20px Arial, sans-serif; fill: #1d1d1d; }
      .detail { font: 16px Arial, sans-serif; fill: #333333; }
      .arrow { stroke: #333333; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="900" height="1220" fill="#ffffff" />

  <text x="450" y="55" text-anchor="middle" class="title">MNIST CNN Architecture</text>
  <text x="450" y="85" text-anchor="middle" class="subtitle">Task 1 Part B network used for handwritten digit recognition</text>

  <rect x="240" y="120" width="420" height="76" class="layer" />
  <text x="450" y="152" text-anchor="middle" class="label">Input</text>
  <text x="450" y="178" text-anchor="middle" class="detail">1 x 28 x 28 grayscale image</text>

  <line x1="450" y1="196" x2="450" y2="238" class="arrow" />

  <rect x="240" y="238" width="420" height="92" class="layer-alt" />
  <text x="450" y="272" text-anchor="middle" class="label">Convolution 1</text>
  <text x="450" y="298" text-anchor="middle" class="detail">10 filters, 5 x 5 kernel</text>
  <text x="450" y="320" text-anchor="middle" class="detail">Output: 10 x 24 x 24</text>

  <line x1="450" y1="330" x2="450" y2="372" class="arrow" />

  <rect x="240" y="372" width="420" height="92" class="layer-soft" />
  <text x="450" y="406" text-anchor="middle" class="label">Max Pool + ReLU</text>
  <text x="450" y="432" text-anchor="middle" class="detail">2 x 2 pooling window</text>
  <text x="450" y="454" text-anchor="middle" class="detail">Output: 10 x 12 x 12</text>

  <line x1="450" y1="464" x2="450" y2="506" class="arrow" />

  <rect x="240" y="506" width="420" height="92" class="layer-alt" />
  <text x="450" y="540" text-anchor="middle" class="label">Convolution 2</text>
  <text x="450" y="566" text-anchor="middle" class="detail">20 filters, 5 x 5 kernel</text>
  <text x="450" y="588" text-anchor="middle" class="detail">Output: 20 x 8 x 8</text>

  <line x1="450" y1="598" x2="450" y2="640" class="arrow" />

  <rect x="240" y="640" width="420" height="76" class="layer-soft" />
  <text x="450" y="672" text-anchor="middle" class="label">Dropout2d</text>
  <text x="450" y="698" text-anchor="middle" class="detail">Dropout rate p = 0.5</text>

  <line x1="450" y1="716" x2="450" y2="758" class="arrow" />

  <rect x="240" y="758" width="420" height="92" class="layer-soft" />
  <text x="450" y="792" text-anchor="middle" class="label">Max Pool + ReLU</text>
  <text x="450" y="818" text-anchor="middle" class="detail">2 x 2 pooling window</text>
  <text x="450" y="840" text-anchor="middle" class="detail">Output: 20 x 4 x 4</text>

  <line x1="450" y1="850" x2="450" y2="892" class="arrow" />

  <rect x="240" y="892" width="420" height="76" class="layer" />
  <text x="450" y="924" text-anchor="middle" class="label">Flatten</text>
  <text x="450" y="950" text-anchor="middle" class="detail">20 x 4 x 4 to 320 features</text>

  <line x1="450" y1="968" x2="450" y2="1010" class="arrow" />

  <rect x="240" y="1010" width="420" height="92" class="layer-alt" />
  <text x="450" y="1044" text-anchor="middle" class="label">Fully Connected 1 + ReLU</text>
  <text x="450" y="1070" text-anchor="middle" class="detail">Linear: 320 to 50</text>
  <text x="450" y="1092" text-anchor="middle" class="detail">Output: 50</text>

  <line x1="450" y1="1102" x2="450" y2="1144" class="arrow" />

  <rect x="240" y="1144" width="420" height="92" class="layer-alt" />
  <text x="450" y="1178" text-anchor="middle" class="label">Fully Connected 2 + log_softmax</text>
  <text x="450" y="1204" text-anchor="middle" class="detail">Linear: 50 to 10 output classes</text>
  <text x="450" y="1226" text-anchor="middle" class="detail">Digit scores for 0 through 9</text>
</svg>
